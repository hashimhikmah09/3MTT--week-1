<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/style.css" />

    <title>weather-dashboard</title>
  </head>
  <body class="bg-gray-100 flex justify-center items-center min-h-screen">

      <div class="bg-white p-8 rounded-xl shadow-lg w-[500px]">

        <h1 class="text-2xl font-bold text-center mb-6">
           Weather Dashboard
        </h1>

        <div class="flex gap-2 mb-4">
          <input
          id="cityInput"
          type="text"
          placeholder="Enter city"
          class="border p-2 flex-1 rounded"
          />

          <button
          id="searchBtn"
          class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600"
          >
          Search
          </button>
        </div>

          <p id="error" class="text-red-500"></p>

        <div id="currentWeather" class="mt-4"></div>

          <div
          id="forecast"
          class="grid grid-cols-5 gap-2 mt-6"
          ></div>

          <h3 class="mt-6 font-semibold">Recent Searches</h3>

          <ul id="recentSearches" class="text-blue-500"></ul>

      </div>

      <script type="module" src="/src/main.ts"></script>

  </body>

</html>
